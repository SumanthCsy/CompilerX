<svg width="600" height="100" viewBox="0 0 600 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 5px #00ffff); opacity: 0.8; transform: scale(1); }
      50% { filter: drop-shadow(0 0 20px #00ffff); opacity: 1; transform: scale(1.02); }
    }
    .link-text {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-weight: 900;
      font-size: 32px;
      fill: #00ffff;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      animation: glow 3s infinite ease-in-out;
      cursor: pointer;
    }
    .sub-text {
      font-family: sans-serif;
      font-size: 14px;
      fill: #666;
      font-weight: bold;
      letter-spacing: 0.4em;
    }
  </style>
  <text x="50%" y="45%" text-anchor="middle" dominant-baseline="middle" class="link-text">🚀 Launch Live Demo</text>
  <text x="50%" y="80%" text-anchor="middle" dominant-baseline="middle" class="sub-text">CODEREFINER.VERCEL.APP</text>
</svg>
